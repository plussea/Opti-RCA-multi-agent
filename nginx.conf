events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    sendfile        on;
    keepalive_timeout 65;

    # ── Upstreams ────────────────────────────────────────────────────────────────
    upstream omniops_backend {
        server omniops:8000;
        keepalive 32;
    }

    upstream nextjs_frontend {
        server nextjs:3000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # ── SSE: disable all buffering + X-Accel-Buffering ────────────────────────
        location ~ ^/v1/sessions/.+/stream$ {
            proxy_pass         http://omniops_backend;
            proxy_http_version 1.1;

            proxy_buffering         off;
            proxy_cache            off;
            proxy_request_buffering off;

            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
            proxy_connect_timeout 60s;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Critical: tells uvicorn/FastAPI to disable its own buffering
            add_header X-Accel-Buffering "no" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        # ── OmniOps REST API ─────────────────────────────────────────────────────
        location /v1/ {
            proxy_pass         http://omniops_backend/v1/;
            proxy_http_version 1.1;

            proxy_buffering    off;
            proxy_cache        off;

            proxy_read_timeout     300s;
            proxy_send_timeout     300s;
            proxy_connect_timeout  30s;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── /api/ alias → omniops ───────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://omniops_backend/;
            proxy_http_version 1.1;

            proxy_buffering    off;
            proxy_read_timeout  300s;
            proxy_send_timeout  300s;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # ── Next.js Frontend ─────────────────────────────────────────────────────
        location / {
            proxy_pass         http://nextjs_frontend;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_cache_bypass $http_upgrade;
        }
    }
}
