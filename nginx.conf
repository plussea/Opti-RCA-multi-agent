events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # SSE / streaming: disable buffering so events arrive immediately
    proxy_request_buffering off;
    proxy_buffering off;

    upstream omniops_backend {
        server omniops:8000;
        keepalive 32;
    }

    upstream nextjs_frontend {
        server nextjs:3000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name localhost;

        # ── API + SSE ──────────────────────────────────────────────────────────
        location /v1/ {
            proxy_pass http://omniops_backend/v1/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_pass_request_headers on;

            # Long timeout for SSE streams (can run for hours during human review)
            proxy_read_timeout 86400;
            send_timeout 86400;

            # Disable buffering for SSE
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Alias for /api/ prefix
        location /api/ {
            proxy_pass http://omniops_backend/;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_pass_request_headers on;
            proxy_read_timeout 86400;
            proxy_buffering off;
        }

        # ── Frontend (Next.js) ────────────────────────────────────────────────
        location / {
            proxy_pass http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
