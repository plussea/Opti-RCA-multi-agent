version: "3.8"

services:
  # 一体化数据库：PostgreSQL 15 + pgvector
  postgres:
    image: ankane/pgvector:latest
    environment:
      POSTGRES_DB: omniops
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 缓存 + 轻量 MQ
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ 消息队列 + 管理界面
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: omniops
      RABBITMQ_DEFAULT_PASS: omniops123
    ports:
      - "5672:5672"    # AMQP 协议端口
      - "15672:15672"  # 管理界面 http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # 主应用
  omniops:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/omniops
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://omniops:omniops123@rabbitmq:5672/
      CHROMA_PERSISTENT_PATH: /app/data/chroma
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./data/chroma:/app/data/chroma
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uvicorn omniops.api.main:app --host 0.0.0.0 --port 8000 --reload

  # Neo4j（图数据库）
  neo4j:
    image: neo4j:5.15-community
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  rabbitmq_data: